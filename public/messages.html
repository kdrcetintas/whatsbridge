<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsBridge — Messages</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="bg-light" data-title="Messages">

  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container-lg">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <div class="wb-logo"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></div>
        <span class="fw-bold text-dark">WhatsBridge</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/" data-i18n="tab.status">Status</a></li>
          <li class="nav-item"><a class="nav-link" href="/send" data-i18n="tab.send">Send Message</a></li>
          <li class="nav-item"><a class="nav-link active" href="/messages" data-i18n="tab.messages">Messages</a></li>
          <li class="nav-item"><a class="nav-link" href="/logs" data-i18n="tab.logs">Logs</a></li>
          <li class="nav-item"><a class="nav-link" href="/docs" data-i18n="tab.docs">API Docs</a></li>
        </ul>
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item d-none d-lg-flex align-items-center gap-2 me-2">
            <span class="text-muted small" id="instance-name"></span>
            <span class="wb-status-dot" id="status-dot"></span>
            <span class="small text-muted" id="status-label"></span>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><span id="lang-label">EN</span></a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#" data-lang="en" onclick="switchLang('en');return false">English</a></li>
              <li><a class="dropdown-item" href="#" data-lang="tr" onclick="switchLang('tr');return false">Türkçe</a></li>
            </ul>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" id="btn-logout" data-i18n="header.signout">Sign Out</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-lg py-4">

    <!-- Filters -->
    <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
      <div class="btn-group btn-group-sm" id="filter-btns">
        <button class="btn btn-primary active"  data-filter="">All</button>
        <button class="btn btn-outline-warning"  data-filter="queued">Queued</button>
        <button class="btn btn-outline-success"  data-filter="sent">Sent</button>
        <button class="btn btn-outline-danger"   data-filter="failed">Failed</button>
        <button class="btn btn-outline-primary"  data-filter="inbound">Received</button>
      </div>
      <input type="text" class="form-control form-control-sm ms-auto" id="phone-filter"
        placeholder="Filter by phone…" style="max-width:200px" />
      <button class="btn btn-sm btn-outline-secondary" id="btn-refresh">↻</button>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0 small">
          <thead class="table-light">
            <tr>
              <th style="width:28px"></th>
              <th data-i18n="messages.col.phone">Phone</th>
              <th data-i18n="messages.col.message">Message</th>
              <th data-i18n="messages.col.status">Status</th>
              <th data-i18n="messages.col.time">Time</th>
            </tr>
          </thead>
          <tbody id="msg-tbody">
            <tr id="msg-loading">
              <td colspan="5" class="text-center text-muted py-4">Loading…</td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- Pagination -->
      <div class="card-footer bg-white d-flex align-items-center justify-content-between py-2">
        <span class="small text-muted" id="msg-count"></span>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-secondary" id="btn-prev" disabled>← Prev</button>
          <button class="btn btn-sm btn-outline-secondary" id="btn-next" disabled>Next →</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/i18n.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/messages.js"></script>
</body>
</html>
